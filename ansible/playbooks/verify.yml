---
- name: Verify Data
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Verify 1000 keys
      shell: |
        PASS=0
        FAIL=0
        for i in $(seq 1 1000); do
          KEY=$(printf "key:%04d" $i)
          EXPECTED=$(echo -n "$KEY" | sha256sum | awk '{print $1}')
          ACTUAL=$(redis-cli -c -h 10.10.0.11 GET "$KEY")
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            PASS=$((PASS+1))
          else
            FAIL=$((FAIL+1))
          fi
        done
        echo "PASS: $PASS, FAIL: $FAIL"
      register: verify_result

    - name: Print verify result
      debug:
        msg: "{{ verify_result.stdout }}"
